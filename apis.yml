      - name: Acute Care Hospital Beds
        description: >-
          Smart beds for ICU, med-surg, and progressive care environments with
          integrated monitoring and mobility analytics.
      - name: Vital Signs Documentation
        description: >-
          Automated capture and EMR posting of vital signs from Welch Allyn Connex
