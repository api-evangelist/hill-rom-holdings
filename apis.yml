apis:
  - aid: hill-rom-holdings:hill-rom-smart-beds
    name: Hill-Rom Smart Beds and Patient Support
    tags:
      - Hospital Beds
      - Patient Support
      - Connected Devices
      - Pressure Injury Prevention
    humanURL: https://www.hillrom.com
    properties:
      - url: https://www.hillrom.com
        type: Documentation
    description: >-
      Smart hospital beds, ICU beds, med-surg beds, and patient support systems
      including Centrella, Progressa, and VersaCare platforms. Integrates with hospital
      IT systems for fall risk monitoring, pressure injury prevention, mobility
      tracking, and clinical workflow optimization. Now part of Baxter's Hillrom and
      Front Line Care segment.

  - aid: hill-rom-holdings:welch-allyn-vital-signs
    name: Welch Allyn Vital Signs and Diagnostic Devices
    tags:
      - Vital Signs
      - Diagnostic Devices
      - Connex
      - Spot Vital Signs
      - EMR Integration
    humanURL: https://www.hillrom.com/en/products/welch-allyn
    properties:
      - url: https://www.hillrom.com/en/products/welch-allyn
        type: Documentation
    description: >-
      Welch Allyn vital signs monitors, otoscopes, ophthalmoscopes, ECG devices, and
      diagnostic instruments used across primary care, hospitals, and clinics. Connex
      Spot and Connex Vital Signs Monitors connect to EMRs to deliver automated vital
      signs documentation at the point of care.

  - aid: hill-rom-holdings:bardy-diagnostics-cardiac
    name: Bardy Diagnostics Cardiac Monitoring
    tags:
      - Cardiac Monitoring
      - Ambulatory ECG
      - Arrhythmia Detection
      - Wearable Patch
    humanURL: https://www.hillrom.com
    properties:
      - url: https://www.hillrom.com
        type: Documentation
    description: >-
      Bardy Diagnostics CAM (Carnation Ambulatory Monitor) patch-based ambulatory
      cardiac monitoring solution for arrhythmia detection, acquired by Hill-Rom in
      2021 prior to Baxter's acquisition of Hill-Rom. Provides P-wave-centric ECG data
      with cloud-based analytics for cardiologists and clinicians.

  - aid: hill-rom-holdings:hillrom-connected-care
    name: Hillrom Connected Care and Clinical Workflow
    tags:
      - Connected Care
      - Clinical Workflow
      - Nurse Call
      - Patient Engagement
      - Voalte
    humanURL: https://www.hillrom.com
    properties:
      - url: https://www.hillrom.com
        type: Documentation
    description: >-
      Hillrom connected care platforms including Voalte clinical communication, nurse
      call systems, patient engagement, real-time location services, and clinical
      workflow tools that integrate with hospital EMRs and communication infrastructure.

