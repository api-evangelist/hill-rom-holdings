description: >-
  Hill-Rom Holdings was a global medical technology company best known for its hospital
  beds, patient support systems, Welch Allyn vital signs monitors, and Bardy Diagnostics
  cardiac monitoring devices. Hill-Rom was acquired by Baxter International (NYSE: BAX)
  in December 2021 for $12.4 billion and now operates as Baxter's Hillrom and Front
  Line Care segment, continuing to deliver connected care, smart beds, vital signs
  monitoring, and clinical workflow solutions to hospitals and health systems worldwide.
